<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Snr. Buns - Customers</title>

    <!-- Bootstrap CSS CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap"
      rel="stylesheet"
    />

    <script type="module" src="auth.js"></script>

    <style>
      :root {
        --bg: #fff4d6;
        --text: #333;
        --sidebar: #c82333;
        --sidebar-hover: #a71d2a;
        --card: #ffffff;
        --accent: #ffc107;
        --accent-hover: #ff8800;
        --border: #ccc;
        --input-bg: #fff;
        --summary-bg: #fff;
      }

      body.dark-mode {
        --bg: #121212;
        --text: #f5f5f5;
        --sidebar: #8b1e28;
        --sidebar-hover: #a71d2a;
        --card: #1e1e1e;
        --accent: #d39b00;
        --accent-hover: #ffb300;
        --border: #555;
        --input-bg: #2a2a2a;
        --summary-bg: #1e1e1e;
      }

      body {
        font-family: "Montserrat", sans-serif;
        background-color: var(--bg);
        margin: 0;
        display: flex;
        min-height: 100vh;
        color: var(--text);
      }

      .sidebar {
        background-color: var(--sidebar);
        width: 220px;
        min-width: 220px;
        color: white;
        padding: 2rem 1.5rem;
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        transition: width 0.3s ease, min-width 0.3s ease, padding 0.3s ease,
          transform 0.3s ease;
        overflow: hidden;
      }

      .sidebar h2 {
        font-weight: 700;
        font-size: 1.8rem;
        margin-bottom: 0.75rem;
        user-select: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        white-space: nowrap;
      }

      .sidebar a {
        color: white;
        text-decoration: none;
        font-weight: 600;
        padding: 0.75rem 0.5rem;
        border-radius: 4px;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        transition: background-color 0.3s;
        user-select: none;
      }

      .sidebar a:hover,
      .sidebar a.active {
        background-color: var(--sidebar-hover);
        text-decoration: none;
      }

      .sidebar-toggle-btn {
        background: #ffc107;
        border: none;
        color: #000;
        font-weight: 700;
        border-radius: 8px;
        padding: 0.5rem 0.75rem;
        margin-bottom: 1rem;
        margin-top: 0;
        cursor: pointer;
        align-self: flex-end;
      }

      .sidebar-toggle-btn:hover {
        background: #ffb300;
      }

      body.sidebar-collapsed .sidebar {
        width: 78px;
        min-width: 78px;
        padding: 2rem 0.75rem;
      }

      body.sidebar-collapsed .sidebar h2 {
        font-size: 0;
        gap: 0;
      }

      body.sidebar-collapsed .sidebar h2::before {
        content: "🍔";
        font-size: 1.8rem;
      }

      body.sidebar-collapsed .sidebar a {
        justify-content: center;
        font-size: 0;
        padding: 0.75rem 0;
      }

      body.sidebar-collapsed .sidebar a::first-letter {
        font-size: 1.2rem;
      }

      body.sidebar-collapsed .sidebar-toggle-btn {
        align-self: center;
      }

      main.main-content {
        flex-grow: 1;
        padding: 2rem 2.5rem;
        background-color: var(--bg);
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      h1 {
        color: #c82333;
        font-weight: 700;
        font-size: 2rem;
        margin-bottom: 1.5rem;
        user-select: none;
      }

      .loyalty-list {
        max-width: 700px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        user-select: none;
      }

      .customer-card {
        background: var(--card);
        color: var(--text);
        border-radius: 12px;
        padding: 1rem 1.5rem;
        box-shadow: 0 4px 12px rgb(0 0 0 / 0.1);
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-weight: 600;
        font-size: 1rem;
      }

      .customer-name {
        font-weight: 700;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1 1 auto;
        user-select: text;
      }

      .circles {
        display: flex;
        gap: 0.8rem;
        margin: 0 1rem;
        justify-content: center;
        min-width: 140px;
        flex: 0 0 auto;
      }

      .circle {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: #e0e0e0;
        border: 2px solid #ccc;
        box-shadow: inset 0 0 3px rgba(0, 0, 0, 0.15);
        opacity: 0;
        transform: scale(0.8);
        transition: all 0.3s ease;
      }

      .circle.filled {
        background: #4caf50;
        border: 2px solid #388e3c;
      }

      .circle.show {
        opacity: 1;
        transform: scale(1);
      }

      .circle.empty {
        background: #f9f1d1;
        box-shadow: none;
        border: 1.5px solid #f3d470;
      }

      .total-visits {
        color: #c82333;
        font-weight: 700;
        min-width: 130px;
        text-align: right;
        white-space: nowrap;
        flex: 0 0 auto;
        user-select: none;
      }

      #leaderboard {
        max-width: 700px;
        margin: 0 auto 1.5rem;
        text-align: center;
        background: var(--card);
        color: var(--text);
        padding: 1rem;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      #leaderboard h2 {
        color: #c82333;
        font-weight: 700;
        margin-bottom: 0.75rem;
      }

      .leaderboard-card {
        background: var(--card);
        color: var(--text);
        border: 2px solid #c82333;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.12);
        padding: 1rem 1.5rem;
        margin: 0 auto 1.2rem;
        text-align: center;
        font-weight: 700;
        display: inline-block;
        min-width: 260px;
      }

      .leaderboard-card h2 {
        color: #c82333;
        font-weight: 800;
        margin-bottom: 0.6rem;
        font-size: 1.3rem;
      }

      .leaderboard-card p {
        margin: 0.25rem 0;
        font-size: 1rem;
      }

      .leaderboard-card p strong {
        font-weight: 800;
        color: var(--text);
      }

      .leaderboard-card p:nth-child(2) strong {
        color: #c82333;
      }

      .leaderboard-card p:nth-child(3) strong {
        color: #a71d2a;
      }

      .leaderboard-card p:nth-child(4) strong {
        color: #ff8800;
      }

      .hamburger {
        display: none;
        font-size: 2rem;
        background: #c82333;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 6px 12px;
        cursor: pointer;
        position: fixed;
        top: 15px;
        left: 15px;
        z-index: 3000;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
        transition: background 0.2s;
      }

      .hamburger:hover {
        background: #a71d2a;
      }

      @media (max-width: 768px) {
        .hamburger {
          display: block;
        }

        .sidebar-toggle-btn {
          display: none;
        }

        body.sidebar-collapsed .sidebar {
          width: 220px;
          min-width: 220px;
          padding: 2rem 1.5rem;
        }

        body.sidebar-collapsed .sidebar h2 {
          font-size: 1.8rem;
          gap: 0.4rem;
        }

        body.sidebar-collapsed .sidebar h2::before {
          content: none;
        }

        body.sidebar-collapsed .sidebar a {
          justify-content: flex-start;
          font-size: 1rem;
          padding: 0.75rem 0.5rem;
        }

        body.sidebar-collapsed .sidebar a::first-letter {
          font-size: 1rem;
        }

        .sidebar {
          position: fixed;
          top: 0;
          left: 0;
          height: 100vh;
          width: 220px;
          background-color: var(--sidebar);
          transform: translateX(-100%);
          transition: transform 0.3s ease;
          z-index: 1500;
        }

        .sidebar.active {
          transform: translateX(0);
        }

        .main-container {
          flex-direction: column;
        }

        main {
          padding: 100px 1rem 1rem;
          margin-left: 0;
        }

        .main-content {
          padding: 100px 1rem 1rem;
          margin-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <button id="menuToggle" class="hamburger">☰</button>
    <div
      class="main-container"
      style="display: flex; width: 100%; min-height: 100vh"
    >
      <!-- Sidebar -->
      <aside class="sidebar">
        <h2>🍔 Snr. Buns</h2>
        <button id="sidebarCollapseBtn" class="sidebar-toggle-btn">⬅</button>
        <nav>
          <ul class="list-unstyled">
            <li><a href="home.html">🏠 Home</a></li>
            <li><a href="register.html">🖋️ Register</a></li>
            <li><a href="orders.html">📋 Orders</a></li>
            <li><a href="inventory.html">📦 Inventory</a></li>
            <li><a href="market.html">🏪 Market Run</a></li>
            <li><a href="staffmeals.html">🍽️ Staff Meals</a></li>
            <li><a href="loyalty.html" class="active">🎁 Customers</a></li>
          </ul>
        </nav>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <h1>🎁 Customers</h1>

        <p
          style="
            margin-top: -0.5rem;
            margin-bottom: 1rem;
            font-weight: 600;
            color: #c82333;
          "
        >
          Right now, every 5th visit a customer will receive a free dessert -
          this will flag up on the order sheet. The reward will increase over
          time as we grow.
        </p>

        <!-- Search bar -->
        <input
          type="text"
          id="searchCustomers"
          placeholder="Search customers..."
          style="
            max-width: 400px;
            margin: 0 auto 1rem;
            padding: 0.6rem 1rem;
            border-radius: 10px;
            border: 2px solid #c82333;
            font-weight: 600;
            font-size: 1rem;
            display: block;
          "
        />

        <!-- Customer list -->
        <div class="loyalty-list" id="loyaltyList"></div>
      </main>
    </div>

    <script type="module">
      import {
        getFirestore,
        collection,
        query,
        orderBy,
        onSnapshot,
        documentId,
      } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
      import { app } from "./auth.js";

      const db = getFirestore(app);

      const MAX_CIRCLES = 5;

      function capitalizeName(name) {
        return (name || "")
          .trim()
          .split(/\s+/)
          .map((w) => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())
          .join(" ");
      }

      function renderLoyaltyFromDocs(docs) {
        const container = document.getElementById("loyaltyList");
        container.innerHTML = "";

        const rows = docs.map((d) => {
          const data = d.data() || {};
          return {
            id: d.id,
            name: data.name || d.id,
            visits: Number(data.visits || 0),
            spent: Number(data.totalSpent || data.spent || 0),
            lastVisit: data.lastVisit,
          };
        });

        if (rows.length === 0) {
          container.innerHTML = "<p>No customer data found.</p>";
          return;
        }

        const topVisits = [...rows]
          .sort((a, b) => b.visits - a.visits)
          .slice(0, 3);
        const visitsCard = document.createElement("div");
        visitsCard.className = "leaderboard-card";
        visitsCard.innerHTML = `
          <h2>🏆 Top Visitors</h2>
          ${topVisits
            .map(
              (r, i) =>
                `<p><strong>${i + 1}. ${capitalizeName(r.name)}</strong> — ${
                  r.visits
                } visits</p>`
            )
            .join("")}
        `;
        container.appendChild(visitsCard);

        const topSpenders = [...rows]
          .sort((a, b) => b.spent - a.spent)
          .slice(0, 3);
        const spendersCard = document.createElement("div");
        spendersCard.className = "leaderboard-card";
        spendersCard.innerHTML = `
          <h2>💰 Top Spenders</h2>
          ${topSpenders
            .map(
              (r, i) =>
                `<p><strong>${i + 1}. ${capitalizeName(
                  r.name
                )}</strong> — $${r.spent.toFixed(2)}</p>`
            )
            .join("")}
        `;
        container.appendChild(spendersCard);

        rows
          .sort((a, b) => a.name.localeCompare(b.name))
          .forEach((r) => {
            const modVisits =
              r.visits % MAX_CIRCLES === 0 && r.visits > 0
                ? MAX_CIRCLES
                : r.visits % MAX_CIRCLES;

            let circlesHTML = "";
            for (let i = 1; i <= MAX_CIRCLES; i++) {
              circlesHTML += `<div class="circle${
                i <= modVisits ? " filled" : " empty"
              }"></div>`;
            }

            const card = document.createElement("div");
            card.className = "customer-card";
            card.innerHTML = `
              <div class="customer-name">${capitalizeName(r.name)}</div>
              <div class="circles">${circlesHTML}</div>
              <div class="total-visits">
                Visits: ${r.visits}<br>
                Spent: $${r.spent.toFixed(2)}
              </div>
            `;
            container.appendChild(card);

            const circles = card.querySelectorAll(".circle");
            circles.forEach((c, idx) =>
              setTimeout(() => c.classList.add("show"), idx * 120)
            );
          });
      }

      const loyaltyQ = query(collection(db, "loyalty"), orderBy(documentId()));
      onSnapshot(loyaltyQ, (snap) => {
        renderLoyaltyFromDocs(snap.docs);
      });

      document
        .getElementById("searchCustomers")
        .addEventListener("input", (e) => {
          const term = e.target.value.toLowerCase().trim();
          document.querySelectorAll(".customer-card").forEach((card) => {
            const name = (
              card.querySelector(".customer-name")?.textContent || ""
            ).toLowerCase();
            card.style.display = name.includes(term) ? "flex" : "none";
          });

          document
            .querySelectorAll(".leaderboard-card")
            .forEach((c) => (c.style.display = term ? "none" : "inline-block"));
        });
    </script>

    <script>
      const body = document.body;
      const menuBtn = document.getElementById("menuToggle");
      const sidebar = document.querySelector(".sidebar");
      const sidebarCollapseBtn = document.getElementById("sidebarCollapseBtn");

      function applySidebarSetting() {
        const collapsed = localStorage.getItem("sidebarCollapsed") === "true";

        if (window.innerWidth > 768) {
          body.classList.toggle("sidebar-collapsed", collapsed);
          if (sidebarCollapseBtn) {
            sidebarCollapseBtn.textContent = collapsed ? "➡" : "⬅";
          }
        } else {
          body.classList.remove("sidebar-collapsed");
          if (sidebarCollapseBtn) {
            sidebarCollapseBtn.textContent = "⬅";
          }
        }
      }

      applySidebarSetting();

      menuBtn?.addEventListener("click", () => {
        sidebar.classList.toggle("active");
        menuBtn.textContent = sidebar.classList.contains("active") ? "✖" : "☰";
      });

      sidebarCollapseBtn?.addEventListener("click", () => {
        if (window.innerWidth <= 768) return;

        body.classList.toggle("sidebar-collapsed");
        const collapsed = body.classList.contains("sidebar-collapsed");
        localStorage.setItem("sidebarCollapsed", collapsed ? "true" : "false");
        sidebarCollapseBtn.textContent = collapsed ? "➡" : "⬅";
      });

      window.addEventListener("resize", applySidebarSetting);
    </script>

    <script>
      if (localStorage.getItem("darkMode") === "true") {
        document.body.classList.add("dark-mode");
      }
    </script>
  </body>
</html>
